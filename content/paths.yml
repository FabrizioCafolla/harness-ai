opencode:
  base_dir: .opencode
  agents:
    dir: agents
    suffix: .md
  skills:
    dir: skills
    filename: SKILL.md
  hooks:
    source: config/opencode/rtk-plugin.ts
    dest: .opencode/plugins/rtk.ts

claude:
  base_dir: .claude
  agents:
    dir: agents
    suffix: .md
  skills:
    dir: skills
    filename: SKILL.md
  extra_files:
    settings:
      - source: config/claude/settings.json
        dest: .claude/settings.json
        ignore: false
      - source: config/claude/settings.local.json
        dest: .claude/settings.local.json
        ignore: true
      - source: config/claude/statusline.sh
        dest: .claude/statusline.sh
        ignore: false
  hooks:
    source: config/claude/hooks.json
